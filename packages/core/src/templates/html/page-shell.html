<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111827;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img,
    svg,
    video,
    canvas {
      display: block;
      max-width: 100%;
    }

    #app {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    // OwnDesign Single HTML app logic starts here.
  </script>
</body>
</html>
