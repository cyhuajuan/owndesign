<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      color-scheme: light;
      font-family: "Inter", "Noto Sans SC", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #111827;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img,
    svg,
    video,
    canvas {
      display: block;
      max-width: 100%;
    }

    #app {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    // OwnDesign Single HTML app logic starts here.
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
